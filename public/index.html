<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeCollab - Login</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="js/theme.js"></script>
</head>

<body>
    <div class="auth-container">
        <div class="auth-box">
            <h1>CodeCollab</h1>
            <p class="subtitle">Real-time collaborative coding platform</p>

            <div id="login-form" class="form-container">
                <h2>Login</h2>
                <form id="form-login">
                    <div class="input-group">
                        <label>Email</label>
                        <input type="email" id="login-email" required>
                    </div>
                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" id="login-password" required>
                    </div>
                    <button type="submit" class="btn primary-btn">Login</button>
                    <p class="error-msg" id="login-error"></p>
                </form>
                <p class="toggle-text">Don't have an account? <span onclick="toggleAuth('register')">Sign Up</span></p>
            </div>

            <div id="register-form" class="form-container hidden">
                <h2>Sign Up</h2>
                <form id="form-register">
                    <div class="input-group">
                        <label>Username</label>
                        <input type="text" id="register-username" required>
                    </div>
                    <div class="input-group">
                        <label>Email</label>
                        <input type="email" id="register-email" required>
                    </div>
                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" id="register-password" required>
                    </div>
                    <button type="submit" class="btn primary-btn">Create Account</button>
                    <p class="error-msg" id="register-error"></p>
                </form>
                <p class="toggle-text">Already have an account? <span onclick="toggleAuth('login')">Login</span></p>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>

</html>
