<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeCollab - Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="js/theme.js"></script>
</head>

<body>
    <div class="dashboard-container">
        <header class="dashboard-header">
            <h1>CodeCollab</h1>
            <div class="user-info">
                <span id="welcome-msg">Welcome, User</span>
                <button id="logout-btn" class="btn btn-small">Logout</button>
            </div>
        </header>

        <main>
            <div class="room-actions">
                <div class="action-card">
                    <h3>Create a Room</h3>
                    <p>Start a new collaborative coding session and invite others.</p>
                    <button id="create-room-btn" class="btn primary-btn">Create New Room</button>
                </div>

                <div class="or-divider">OR</div>

                <div class="action-card">
                    <h3>Join a Room</h3>
                    <p>Enter a Room ID to join an existing session.</p>
                    <div class="input-group">
                        <input type="text" id="room-id-input" placeholder="e.g. ABC123" required>
                    </div>
                    <button id="join-room-btn" class="btn primary-btn">Join Room</button>
                    <p class="error-msg" id="join-error"></p>
                </div>
            </div>
        </main>
    </div>

    <script src="js/dashboard.js"></script>
</body>

</html>
